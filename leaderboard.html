<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-6255373288681857">
  <title>Online Játékok – Ranglista</title>
  <link rel="stylesheet" href="style.css?v=5" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6255373288681857" crossorigin="anonymous"></script>
  <style>
    .lb-table{width:100%;border-collapse:collapse}
    .lb-table thead tr{border-bottom:2px solid var(--border)}
    .lb-table th{text-align:left;padding:10px 14px;font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
    .lb-table th.right{text-align:right}
    .lb-table tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
    .lb-table tbody tr:last-child{border-bottom:none}
    .lb-table tbody tr:hover{background:var(--bg2)}
    .lb-table td{padding:13px 14px;vertical-align:middle}
    .lb-table td.right{text-align:right}
    .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-weight:900;font-size:.95rem;background:var(--bg2);color:var(--muted)}
    .rank-badge.top1{background:rgba(245,200,66,.15);color:#f5c842;font-size:1.2rem}
    .rank-badge.top2{background:rgba(192,192,192,.15);color:#c0c0c0;font-size:1.2rem}
    .rank-badge.top3{background:rgba(205,127,50,.15);color:#cd7f32;font-size:1.2rem}
    .player-cell{display:flex;align-items:center;gap:12px}
    .mini-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;color:#fff;flex-shrink:0}
    .player-name-link{font-weight:600;color:var(--text);text-decoration:none}
    .player-name-link:hover{color:var(--accent)}
    .player-sub{font-size:.78rem;color:var(--muted);margin-top:2px}
    .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.78rem;font-weight:700}
    .pill-gold{background:rgba(245,200,66,.15);color:var(--gold)}
    .pill-green{background:rgba(92,252,142,.12);color:var(--green)}
    .pill-muted{background:var(--bg2);color:var(--muted)}
    .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .filter-btn{background:var(--bg2);border:1px solid var(--border);border-radius:999px;color:var(--muted);padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .15s;font-family:inherit}
    .filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
    .stats-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
    .stats-bar .stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;flex:1;min-width:120px;text-align:center}
    .stats-bar .stat .val{font-size:1.6rem;font-weight:900;color:var(--accent)}
    .stats-bar .stat .lbl{font-size:.78rem;color:var(--muted);margin-top:2px}
    .you-badge{display:inline-block;background:var(--accent);color:#fff;font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
    /* Ranglista táblázat vízszintes görgetés mobilon */
    .card.lb-card{overflow-x:auto;padding:0}
    @media(max-width:600px){
      .lb-table th:nth-child(4),.lb-table td:nth-child(4),
      .lb-table th:nth-child(6),.lb-table td:nth-child(6){display:none}
      .lb-table td,.lb-table th{padding:10px 8px;font-size:.8rem}
      .player-cell{gap:7px}
      .mini-avatar{width:28px;height:28px;font-size:.8rem}
      .stats-bar .stat{padding:10px 12px}
      .stats-bar .stat .val{font-size:1.2rem}
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">[ Online Játékok ]</div>
  <nav class="nav-links">
    <a href="index.html">Főoldal</a>
    <a href="wheel.html">🎡 Kerék</a>
    <a href="leaderboard.html" style="color:var(--accent);">🏆 Ranglista</a>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">⚙️ Beállítások</button>
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="profile.html" id="nav-profile" style="display:none;">Profilom</a>
    <button id="nav-logout" style="display:none;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;" onclick="doLogout()">Kilépés</button>
  </nav>
</header>

<main class="container">
  <div style="margin-bottom:24px;margin-top:8px;">
    <h1 style="font-size:1.8rem;font-weight:900;margin-bottom:4px;">🏆 Ranglista</h1>
    <p style="color:var(--muted);font-size:.92rem;">Minden regisztrált játékos — XP az Akasztófából és Szókapcsolatból összesítve.</p>
  </div>

  <div id="loading" class="center" style="padding:48px;color:var(--muted);">⏳ Betöltés...</div>

  <div id="content" style="display:none;">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="setSort('xp',this)">⚡ Rang / XP</button>
      <button class="filter-btn" onclick="setSort('coins',this)">⭐ Legtöbb csillag</button>
      <button class="filter-btn" onclick="setSort('games',this)">🎮 Legtöbb meccs</button>
      <button class="filter-btn" onclick="setSort('newest',this)">🆕 Legújabb</button>
    </div>
    <div class="card lb-card">
      <table class="lb-table">
        <thead>
          <tr>
            <th style="width:52px;">#</th>
            <th>Játékos</th>
            <th class="right">XP</th>
            <th class="right">⭐ Csillag</th>
            <th class="right">Meccsek</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
      <div id="lb-empty" style="display:none;text-align:center;padding:48px;color:var(--muted);">
        <div style="font-size:3rem;margin-bottom:12px;">👥</div>
        <div>Még nincs egyetlen regisztrált játékos sem.</div>
        <a href="index.html" class="btn btn-primary btn-sm" style="margin-top:16px;display:inline-block;">Regisztrálj elsőként!</a>
      </div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="ranks.js"></script>
<script src="settings.js"></script>
<script src="hamburger.js"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const myName = localStorage.getItem(SESSION_KEY);

function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

if (myName) {
  document.getElementById('nav-user').textContent = myName;
  document.getElementById('nav-game').style.display = 'inline';
  document.getElementById('nav-profile').style.display = 'inline';
  document.getElementById('nav-profile').href = 'profile.html?player=' + encodeURIComponent(myName);
  document.getElementById('nav-logout').style.display = 'inline';
}

let allUsers = [];
let currentSort = 'xp';

function formatDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('hu-HU', { month:'short', day:'numeric' });
}

function rankBadge(i) {
  if (i===0) return '<div class="rank-badge top1">🥇</div>';
  if (i===1) return '<div class="rank-badge top2">🥈</div>';
  if (i===2) return '<div class="rank-badge top3">🥉</div>';
  return '<div class="rank-badge">'+(i+1)+'</div>';
}

function getSorted() {
  const copy = [...allUsers];
  switch(currentSort) {
    case 'xp': return copy.sort((a,b) => {
      const diff = (Number(b.xp)||0) - (Number(a.xp)||0);
      if (diff !== 0) return diff;
      return (Number(b.coins)||0) - (Number(a.coins)||0);
    });
    case 'coins':  return copy.sort((a,b)=>(b.coins||0)-(a.coins||0));
    case 'games':  return copy.sort((a,b)=>(b.gamesPlayed||0)-(a.gamesPlayed||0));
    case 'newest': return copy.sort((a,b)=>(b.created||0)-(a.created||0));
    default: return copy;
  }
}

function setSort(type, btn) {
  currentSort = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderStats() {
  const total = allUsers.length;
  const totalGames = allUsers.reduce((s,u)=>s+(u.gamesPlayed||0),0);
  const totalXP = allUsers.reduce((s,u)=>s+(u.xp||0),0);
  const totalCoins = allUsers.reduce((s,u)=>s+(u.coins||0),0);
  document.getElementById('stats-bar').innerHTML =
    '<div class="stat"><div class="val">'+total+'</div><div class="lbl">Regisztrált játékos</div></div>' +
    '<div class="stat"><div class="val">'+totalGames+'</div><div class="lbl">Összes meccs</div></div>' +
    '<div class="stat"><div class="val" style="color:var(--accent);">'+totalXP+' XP</div><div class="lbl">Összes XP</div></div>' +
    '<div class="stat"><div class="val" style="color:var(--gold);">'+totalCoins+' ⭐</div><div class="lbl">Összes csillag</div></div>';
}

function renderTable() {
  const sorted = getSorted();
  const tbody = document.getElementById('lb-body');
  if (sorted.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('lb-empty').style.display = 'block';
    return;
  }
  document.getElementById('lb-empty').style.display = 'none';

  function stringToColor(str) {
    const colors = ['#7c5cfc','#c45cfc','#fc5c5c','#5cfc8e','#f5c842','#5c9efc','#fc9e5c','#5cfcdc'];
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
  }
  function getRankIndex(xp) {
    const t = [0,30,100,200,350,550,800,1200]; let idx=0;
    for (let i=0;i<t.length;i++) { if(xp>=t[i]) idx=i; } return idx;
  }

  tbody.innerHTML = sorted.map((u,i) => {
    const isMe = u.name === myName;
    const rank = getRank(u.xp || 0);
    const rankIdx = getRankIndex(u.xp || 0);
    const prog = getXpProgress(u.xp || 0);
    const avatarColor = stringToColor(u.name);
    const xpBar = prog.next
      ? '<div style="background:var(--border);border-radius:999px;height:4px;width:50px;display:inline-block;vertical-align:middle;margin-left:5px;overflow:hidden;"><div style="height:100%;width:'+prog.pct+'%;background:'+rank.color+';border-radius:999px;"></div></div>'
      : '';
    return '<tr style="'+(isMe?'background:rgba(124,92,252,0.07);':'')+'">' +
      '<td>'+rankBadge(i)+'</td>' +
      '<td><div class="player-cell">' +
        '<div class="mini-avatar" style="background:'+avatarColor+';">'+u.name.charAt(0).toUpperCase()+'</div>' +
        '<div>' +
          '<div style="display:flex;align-items:center;gap:6px;">' +
            '<a href="profile.html?player='+encodeURIComponent(u.name)+'" class="player-name-link">'+u.name+'</a>' +
            '<span class="rank-pill rank-pill-'+rankIdx+'">'+rank.name+'</span>' +
            (isMe?'<span class="you-badge">Te</span>':'') +
          '</div>' +
          '<div class="player-sub">'+formatDate(u.created)+'</div>' +
        '</div>' +
      '</div></td>' +
      '<td class="right" style="font-weight:700;color:var(--accent);">'+(u.xp||0)+' XP'+xpBar+'</td>' +
      '<td class="right" style="color:var(--gold);font-weight:700;">'+(u.coins||0)+' ⭐</td>' +
      '<td class="right" style="color:var(--muted);">'+(u.gamesPlayed||0)+'</td>' +
    '</tr>';
  }).join('');
}

// ── Valós idejű frissítés onSnapshot-tal ──
function init() {
  db.collection('users').onSnapshot(snap => {
    allUsers = [];
    snap.forEach(d => {
      const u = d.data();
      // Ha nincs xp mező, 0-nak számít
      if (u.xp === undefined || u.xp === null) u.xp = 0;
      allUsers.push(u);
    });
    // XP szerint csökkenő rendezés
    allUsers.sort((a,b) => {
      const diff = (Number(b.xp)||0) - (Number(a.xp)||0);
      if (diff !== 0) return diff;
      return (Number(b.coins)||0) - (Number(a.coins)||0);
    });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    renderStats();
    renderTable();
  }, err => {
    console.error(err);
    document.getElementById('loading').innerHTML = '❌ Hiba a betöltésnél';
  });
}

init();
</script>
</body>
</html>
