<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Online Játékok – Toronyrakós</title>
  <link rel="stylesheet" href="style.css?v=9" />
  <style>
    body { overflow: hidden; }

    .tower-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 0;
      height: calc(100vh - 56px);
      position: relative;
    }

    /* HUD */
    .tower-hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      padding: 0 16px 8px;
      flex-shrink: 0;
    }
    .tower-score {
      font-size: 2rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
    }
    .tower-score-label {
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
    }
    .tower-best {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
    }

    /* Canvas */
    #tower-canvas {
      display: block;
      border-radius: 12px;
      cursor: pointer;
      touch-action: none;
      flex-shrink: 0;
    }

    /* Tap hint */
    .tap-hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: .88rem;
      font-weight: 600;
      animation: blink 1.2s infinite;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Game over overlay */
    .go-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,13,26,.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .3s ease;
    }
    .go-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    .go-box .go-icon { font-size: 3.5rem; margin-bottom: 10px; }
    .go-box h2 { font-size: 1.6rem; font-weight: 900; margin-bottom: 6px; }
    .go-box .go-score { font-size: 3rem; font-weight: 900; color: var(--accent); margin: 12px 0 4px; }
    .go-box .go-best { font-size: .9rem; color: var(--gold); margin-bottom: 20px; }
    .go-box .go-btns { display: flex; gap: 12px; justify-content: center; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="logo">[ Online Játékok ]</div>
  <nav class="nav-links">
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="index.html">Főoldal</a>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">⚙ Beállítások</button>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">Kilépés</button>
  </nav>
</header>

<div class="tower-wrap">
  <div class="tower-hud">
    <div>
      <div class="tower-score" id="score-display">0</div>
      <div class="tower-score-label">szint</div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:.78rem;color:var(--muted);">Koppints vagy kattints a lerakáshoz!</div>
    </div>
    <div>
      <div class="tower-best" id="best-display">⭐ 0</div>
      <div class="tower-score-label">legjobb</div>
    </div>
  </div>

  <canvas id="tower-canvas"></canvas>
  <div class="tap-hint" id="tap-hint">👆 Koppints!</div>
</div>

<!-- Game Over -->
<div class="go-overlay" id="go-overlay" style="display:none;">
  <div class="go-box">
    <div class="go-icon">🏗️</div>
    <h2>Ledőlt a torony!</h2>
    <div class="go-score" id="go-score">0</div>
    <div class="go-best" id="go-best-text"></div>
    <div class="go-btns">
      <button class="btn btn-primary" onclick="restartGame()">▶ Újra</button>
      <a href="index.html" class="btn btn-outline">Főoldal</a>
    </div>
  </div>
</div>

<script src="firebase.js"></script>
<script src="settings.js"></script>
<script src="hamburger.js"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY);
if (!username) { window.location.href = 'index.html'; }
document.getElementById('nav-user').textContent = username;
function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

// Presence
db.collection('presence').doc(username).set({ name: username, online: true, where: 'torony', since: Date.now() }).catch(()=>{});
window.addEventListener('beforeunload', () => db.collection('presence').doc(username).delete().catch(()=>{}));

// ── Canvas setup ──
const canvas = document.getElementById('tower-canvas');
const ctx = canvas.getContext('2d');

const BEST_KEY = 'tower_best_' + username;

// Méretek
function resizeCanvas() {
  const wrap = document.querySelector('.tower-wrap');
  const hud = document.querySelector('.tower-hud');
  const availH = wrap.clientHeight - hud.offsetHeight - 10;
  const availW = Math.min(wrap.clientWidth, 420);
  canvas.width  = availW;
  canvas.height = availH;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

// ── Játék konstansok ──
const BLOCK_H      = 28;       // blokk magassága px
const BASE_SPEED   = 2.5;      // kezdő sebesség
const SPEED_INC    = 0.13;     // szintenként gyorsul
const MAX_SPEED    = 11;
const COLORS = [
  '#7c5cfc','#c45cfc','#fc5c5c','#5cfc8e','#f5c842',
  '#5c9efc','#fc9e5c','#5cfcdc','#fc5ca8','#a8fc5c'
];

// ── Játék állapot ──
let blocks   = [];   // { x, width, color } — lerakott blokkok (alulról)
let moving   = null; // { x, width, color, dir, speed }
let score    = 0;
let gameOver = false;
let animId   = null;
let started  = false;
let bestScore = parseInt(localStorage.getItem(BEST_KEY) || '0');

document.getElementById('best-display').textContent = '⭐ ' + bestScore;

// ── Inicializálás ──
function initGame() {
  blocks = [];
  score  = 0;
  gameOver = false;
  started  = false;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('tap-hint').style.display = 'block';
  document.getElementById('go-overlay').style.display = 'none';

  // Alap blokk — középen, fix
  const baseW = Math.round(canvas.width * 0.55);
  const baseX = Math.round((canvas.width - baseW) / 2);
  blocks.push({ x: baseX, width: baseW, color: COLORS[0] });

  spawnMoving();
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function spawnMoving() {
  const last  = blocks[blocks.length - 1];
  const speed = Math.min(BASE_SPEED + score * SPEED_INC, MAX_SPEED);
  const color = COLORS[(blocks.length) % COLORS.length];

  // Mozgó blokk az utolsó szélességével indul, de balról jön
  moving = {
    x:     -last.width,
    width:  last.width,
    color:  color,
    dir:    1,
    speed:  speed
  };
}

// ── Fő game loop ──
function gameLoop() {
  update();
  draw();
  if (!gameOver) animId = requestAnimationFrame(gameLoop);
}

function update() {
  if (!moving) return;

  // Mozgatás
  moving.x += moving.dir * moving.speed;

  // Falak
  if (moving.x + moving.width > canvas.width) {
    moving.x  = canvas.width - moving.width;
    moving.dir = -1;
  }
  if (moving.x < 0) {
    moving.x  = 0;
    moving.dir = 1;
  }
}

// ── Lerakás ──
function drop() {
  if (gameOver) return;
  if (!started) {
    started = true;
    document.getElementById('tap-hint').style.display = 'none';
  }

  const last = blocks[blocks.length - 1];

  // Átfedés számítás
  const overlapLeft  = Math.max(moving.x, last.x);
  const overlapRight = Math.min(moving.x + moving.width, last.x + last.width);
  const overlap      = overlapRight - overlapLeft;

  if (overlap <= 0) {
    // Teljesen mellé ment — vége
    triggerGameOver();
    return;
  }

  // Levágott rész vizuális effekt (nem kell tárolni, csak a lerakott marad)
  const newBlock = {
    x:     overlapLeft,
    width: overlap,
    color: moving.color
  };

  blocks.push(newBlock);
  score++;
  document.getElementById('score-display').textContent = score;

  // Görgetés — torony felfelé tolódik ha teli lesz a canvas
  scrollIfNeeded();

  spawnMoving();
}

// Ha a torony teteje a canvas felső 40%-ába ér, toljuk le az összes blokkot
function scrollIfNeeded() {
  const topY = getBlockY(blocks.length - 1);
  if (topY < canvas.height * 0.40) {
    const shift = Math.round(canvas.height * 0.25);
    blocks.forEach(b => b._scrollOffset = (b._scrollOffset || 0) + shift);
  }
}

// ── Y pozíció számítás (scroll figyelembevételével) ──
function getBlockY(idx) {
  // idx 0 = alap (legalján), idx n = legfelső
  // canvas aljától számítva felfelé
  const scrollTotal = blocks[idx] ? (blocks[idx]._scrollOffset || 0) : 0;
  return canvas.height - BLOCK_H - idx * BLOCK_H - scrollTotal;
}

function getMovingY() {
  if (blocks.length === 0) return 0;
  const topIdx = blocks.length - 1;
  return getBlockY(topIdx) - BLOCK_H;
}

// ── Rajzolás ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Háttér gradiens
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#0d0d1a');
  bg.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Lerakott blokkok
  blocks.forEach((b, idx) => {
    const y = getBlockY(idx);
    if (y > canvas.height || y + BLOCK_H < 0) return; // culling

    // Árnyék
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(b.x + 3, y + 3, b.width, BLOCK_H);

    // Blokk
    ctx.fillStyle = b.color;
    roundRect(ctx, b.x, y, b.width, BLOCK_H, 5);
    ctx.fill();

    // Fény hatás tetején
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    roundRect(ctx, b.x + 2, y + 2, b.width - 4, 8, 3);
    ctx.fill();

    // Szint szám az alap blokkon
    if (idx === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('ALAP', b.x + b.width / 2, y + BLOCK_H / 2);
    }
  });

  // Mozgó blokk
  if (moving) {
    const y = getMovingY();

    // Árnyék
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(moving.x + 3, y + 3, moving.width, BLOCK_H);

    // Blokk
    ctx.fillStyle = moving.color;
    roundRect(ctx, moving.x, y, moving.width, BLOCK_H, 5);
    ctx.fill();

    // Fény
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    roundRect(ctx, moving.x + 2, y + 2, moving.width - 4, 8, 3);
    ctx.fill();

    // Vezető vonal — pontosan alatta
    if (blocks.length > 0) {
      const last = blocks[blocks.length - 1];
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(last.x, y + BLOCK_H);
      ctx.lineTo(last.x, getBlockY(blocks.length - 1));
      ctx.moveTo(last.x + last.width, y + BLOCK_H);
      ctx.lineTo(last.x + last.width, getBlockY(blocks.length - 1));
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Pontszám a canvason belül (nagy, halvány)
  if (score > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.font = 'bold 120px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(score, canvas.width / 2, canvas.height / 2);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Game Over ──
function triggerGameOver() {
  gameOver = true;
  if (animId) cancelAnimationFrame(animId);

  // Utolsó eset: rajzold meg az elbukó blokkot animálva
  draw();

  // Best score
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem(BEST_KEY, bestScore);
    document.getElementById('best-display').textContent = '⭐ ' + bestScore;
    // Firestore mentés
    db.collection('users').doc(username).update({
      towerBest: bestScore
    }).catch(()=>{});
  }

  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best-text').textContent =
    score >= bestScore ? '🏆 Új rekord!' : 'Legjobb: ' + bestScore + ' szint';
  document.getElementById('go-overlay').style.display = 'flex';
}

function restartGame() {
  initGame();
}

// ── Input kezelés ──
canvas.addEventListener('click', drop);
canvas.addEventListener('touchstart', e => { e.preventDefault(); drop(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowDown') { e.preventDefault(); drop(); }
});

// ── Indítás ──
initGame();
</script>
</body>
</html>
