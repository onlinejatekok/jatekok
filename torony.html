<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Online Játékok – Toronyrakós</title>
  <link rel="stylesheet" href="style.css?v=9" />
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }

    .tower-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HUD sáv */
    .tower-hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px 6px;
      background: rgba(13,13,26,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 10;
    }
    .tower-hud .hud-item { text-align: center; }
    .tower-hud .hud-val  { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .tower-hud .hud-lbl  { font-size: .68rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .tower-hud .hud-title {
      font-size: 1rem; font-weight: 900;
      color: rgba(255,255,255,0.7);
      letter-spacing: .05em;
    }

    /* Canvas wrapper — teljes maradék hely */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0a0a18;
    }

    #tower-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tap hint */
    .tap-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: .95rem;
      font-weight: 700;
      animation: blink 1s infinite;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Nav-t elrejti hogy több hely legyen */
    .site-header { display: none; }

    /* Minimalista fejléc helyette */
    .mini-nav {
      position: absolute;
      top: 8px;
      right: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }
    .mini-nav a, .mini-nav button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: .78rem;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
    }

    /* Game over overlay */
    .go-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,5,15,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      animation: fadeIn .3s ease;
    }
    .go-box {
      background: #1a1a2e;
      border: 1px solid rgba(124,92,252,0.4);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 340px;
      width: 88%;
      box-shadow: 0 0 60px rgba(124,92,252,0.2);
    }
    .go-box .go-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .go-box h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 4px; color: #fff; }
    .go-box .go-score { font-size: 4rem; font-weight: 900; color: #7c5cfc; margin: 8px 0 4px; line-height: 1; }
    .go-box .go-label { font-size: .85rem; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .go-box .go-best  { font-size: .92rem; color: #f5c842; font-weight: 700; margin-bottom: 22px; }
    .go-box .go-btns  { display: flex; gap: 12px; justify-content: center; }
    .go-box .btn-restart {
      background: linear-gradient(135deg, #7c5cfc, #c45cfc);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 28px; font-size: 1rem; font-weight: 800;
      cursor: pointer; font-family: inherit;
    }
    .go-box .btn-home {
      background: transparent; color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 12px 20px; font-size: .9rem; font-weight: 600;
      cursor: pointer; font-family: inherit; text-decoration: none;
      display: flex; align-items: center;
    }
  </style>
</head>
<body>

<div class="tower-page">

  <!-- Mini fejléc -->
  <div class="tower-hud">
    <div class="hud-item">
      <div class="hud-val" id="score-display" style="color:#7c5cfc;">0</div>
      <div class="hud-lbl">szint</div>
    </div>
    <div class="hud-title">🏗️ Toronyrakós</div>
    <div class="hud-item">
      <div class="hud-val" id="best-display" style="color:#f5c842;">0</div>
      <div class="hud-lbl">rekord</div>
    </div>
  </div>

  <!-- Mini nav gombok -->
  <div class="mini-nav">
    <a href="index.html">← Főoldal</a>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="tower-canvas"></canvas>
    <div class="tap-hint" id="tap-hint">👆 Koppints a lerakáshoz!</div>
  </div>

</div>

<!-- Game Over -->
<div class="go-overlay" id="go-overlay" style="display:none;">
  <div class="go-box">
    <div class="go-icon">🏗️</div>
    <h2>Ledőlt a torony!</h2>
    <div class="go-score" id="go-score">0</div>
    <div class="go-label">szint</div>
    <div class="go-best" id="go-best-text"></div>
    <div class="go-btns">
      <button class="btn-restart" onclick="restartGame()">▶ Újra</button>
      <a href="index.html" class="btn-home">Főoldal</a>
    </div>
  </div>
</div>

<script src="firebase.js"></script>
<script src="settings.js"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY) || 'Vendég';
function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

// Presence
if (typeof db !== 'undefined') {
  db.collection('presence').doc(username).set({ name: username, online: true, where: 'torony', since: Date.now() }).catch(()=>{});
  window.addEventListener('beforeunload', () => db.collection('presence').doc(username).delete().catch(()=>{}));
}

// ── Canvas setup ──
const canvas  = document.getElementById('tower-canvas');
const ctx     = canvas.getContext('2d');
const wrap    = document.getElementById('canvas-wrap');

function resizeCanvas() {
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

// ── Konstansok ──
const BLOCK_H    = 32;
const BASE_SPEED = 2.8;
const SPEED_INC  = 0.15;
const MAX_SPEED  = 13;
const BLOCK_COLORS = [
  ['#7c5cfc','#5a3dd4'],
  ['#c45cfc','#9a3dd4'],
  ['#fc5c5c','#d43d3d'],
  ['#5cfc8e','#3dd46a'],
  ['#f5c842','#d4a820'],
  ['#5c9efc','#3d7ed4'],
  ['#fc9e5c','#d47e3d'],
  ['#5cfcdc','#3dd4b8'],
  ['#fc5ca8','#d43d88'],
];

const BEST_KEY = 'tower_best_' + username;

// ── Játék állapot ──
let blocks    = [];
let moving    = null;
let score     = 0;
let gameOver  = false;
let animId    = null;
let scrollY   = 0;   // összes görgetés (lefelé tolás px)
let bestScore = parseInt(localStorage.getItem(BEST_KEY) || '0');

document.getElementById('best-display').textContent = bestScore;

// ── Init ──
function initGame() {
  resizeCanvas();
  blocks   = [];
  score    = 0;
  gameOver = false;
  scrollY  = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('tap-hint').style.display = 'block';
  document.getElementById('go-overlay').style.display = 'none';

  const baseW = Math.round(canvas.width * 0.52);
  const baseX = Math.round((canvas.width - baseW) / 2);
  blocks.push({ x: baseX, w: baseW, ci: 0 });

  spawnMoving();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function spawnMoving() {
  const last  = blocks[blocks.length - 1];
  const ci    = blocks.length % BLOCK_COLORS.length;
  const speed = Math.min(BASE_SPEED + score * SPEED_INC, MAX_SPEED);
  moving = { x: -last.w, w: last.w, ci, dir: 1, speed };
}

// ── Game loop ──
function loop() {
  if (gameOver) return;
  update();
  render();
  animId = requestAnimationFrame(loop);
}

function update() {
  moving.x += moving.dir * moving.speed;
  if (moving.x + moving.w >= canvas.width) { moving.x = canvas.width - moving.w; moving.dir = -1; }
  if (moving.x <= 0)                       { moving.x = 0;                        moving.dir =  1; }
}

// ── Lerakás ──
function drop() {
  if (gameOver) return;
  document.getElementById('tap-hint').style.display = 'none';

  const last = blocks[blocks.length - 1];
  const ol   = Math.max(moving.x, last.x);
  const or_  = Math.min(moving.x + moving.w, last.x + last.w);
  const ov   = or_ - ol;

  if (ov <= 2) { endGame(); return; }

  blocks.push({ x: ol, w: ov, ci: moving.ci });
  score++;
  document.getElementById('score-display').textContent = score;

  // Görgetés: ha a torony teteje a canvas felső 35%-ába ér, toljuk le
  const topY = blockY(blocks.length - 1);
  if (topY < canvas.height * 0.35) {
    scrollY += canvas.height * 0.28;
  }

  spawnMoving();
}

// ── Y pozíció egy blokkhoz ──
// idx=0 az alap, legalsó → canvas alján
// scrollY növekedésével az egész torony lefelé csúszik (= a torony teteje feljön)
function blockY(idx) {
  return canvas.height - BLOCK_H - idx * BLOCK_H - scrollY + (scrollY > 0 ? scrollY - scrollY : 0);
}

// Valójában egyszerűbb: minden blokk Y-ja = canvas.height - BLOCK_H - idx*BLOCK_H + scrollOffset
// ahol scrollOffset = scrollY (pozitív = felfelé tolja a blokkokat)
function bY(idx) {
  return canvas.height - BLOCK_H * (idx + 1) + scrollY - scrollY;
}

// Letisztázott Y számítás:
function getY(idx) {
  // canvas alja = 0 szint, felfelé épül
  // scrollY = hány pixelt toltuk fel a "kamerát"
  return canvas.height - BLOCK_H * (idx + 1) - scrollY;
}

function getMovingY() {
  return getY(blocks.length); // pontosan a legfelső blokk felett
}

// ── Render ──
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Háttér: sötét égbolt gradiens
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0,   '#04041a');
  bg.addColorStop(0.5, '#080820');
  bg.addColorStop(1,   '#0f0f28');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Csillagok (statikus, csak dekoráció)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const stars = [[20,30],[80,60],[140,20],[200,80],[260,40],[320,70],[380,25],[60,120],[170,110],[300,130],[100,180],[240,160],[50,200]];
  stars.forEach(([sx, sy]) => {
    const starY = sy - scrollY * 0.1; // parallax
    ctx.beginPath();
    ctx.arc(sx % canvas.width, starY % canvas.height, 1.2, 0, Math.PI*2);
    ctx.fill();
  });

  // Lerakott blokkok
  blocks.forEach((b, idx) => {
    const y = getY(idx);
    if (y > canvas.height + 5 || y + BLOCK_H < -5) return;
    drawBlock(b.x, y, b.w, BLOCK_H, b.ci, idx === 0);
  });

  // Mozgó blokk
  const my = getMovingY();
  drawBlock(moving.x, my, moving.w, BLOCK_H, moving.ci, false);

  // Irányzó vonalak (halvány) — mutatja hol van az utolsó blokk széle
  const last = blocks[blocks.length - 1];
  const ly   = getY(blocks.length - 1);
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([5, 6]);
  ctx.beginPath();
  ctx.moveTo(last.x, 0);          ctx.lineTo(last.x, ly);
  ctx.moveTo(last.x + last.w, 0); ctx.lineTo(last.x + last.w, ly);
  ctx.stroke();
  ctx.setLineDash([]);

  // Nagy halvány pontszám a háttérben
  if (score > 0) {
    ctx.save();
    ctx.font = `bold ${Math.min(180, canvas.width * 0.45)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(124,92,252,0.06)';
    ctx.fillText(score, canvas.width / 2, canvas.height / 2);
    ctx.restore();
  }
}

function drawBlock(x, y, w, h, ci, isBase) {
  const [col, dark] = BLOCK_COLORS[ci % BLOCK_COLORS.length];

  // Árnyék
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(x + 4, y + 5, w, h);

  // Alap blokk sötétebb
  ctx.fillStyle = isBase ? dark : col;
  roundRect(x, y, w, h, 6);
  ctx.fill();

  // Felső fény csík
  const shine = ctx.createLinearGradient(x, y, x, y + h);
  shine.addColorStop(0,   'rgba(255,255,255,0.28)');
  shine.addColorStop(0.4, 'rgba(255,255,255,0.06)');
  shine.addColorStop(1,   'rgba(0,0,0,0.1)');
  ctx.fillStyle = shine;
  roundRect(x, y, w, h, 6);
  ctx.fill();

  // Oldal árnyék
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(x + w - 4, y + 4, 4, h - 4);

  // Alap felirat
  if (isBase && w > 50) {
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('START', x + w / 2, y + h / 2);
  }
}

function roundRect(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

// ── Game Over ──
function endGame() {
  gameOver = true;
  cancelAnimationFrame(animId);
  render(); // utolsó frame

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem(BEST_KEY, bestScore);
    document.getElementById('best-display').textContent = bestScore;
    if (typeof db !== 'undefined') {
      db.collection('users').doc(username).update({ towerBest: bestScore }).catch(()=>{});
    }
  }

  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best-text').textContent =
    score > 0 && score >= bestScore ? '🏆 Új rekord!' : 'Rekord: ' + bestScore + ' szint';
  setTimeout(() => { document.getElementById('go-overlay').style.display = 'flex'; }, 300);
}

function restartGame() { initGame(); }

// ── Input ──
// Kattintás — csak canvas-ra
wrap.addEventListener('click', function(e) {
  drop();
});
wrap.addEventListener('touchstart', function(e) {
  e.preventDefault();
  drop();
}, { passive: false });
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowDown' || e.code === 'ArrowUp') {
    e.preventDefault();
    drop();
  }
});

// ── Start ──
window.addEventListener('load', () => {
  resizeCanvas();
  initGame();
});
window.addEventListener('resize', () => {
  resizeCanvas();
  // Újraindítás resize-kor hogy ne csússzon el minden
  if (!gameOver) initGame();
});
</script>
</body>
</html>
