<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AkasztófaOnline – Páros játék</title>
  <link rel="stylesheet" href="style.css?v=9" />
  <style>
    .paros-wrap { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
    .lobby-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
    .player-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--bg2); border-radius:12px; margin-bottom:8px; border:2px solid transparent; }
    .player-row.online { border-color: var(--green); }
    .player-row .pr-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:900; color:#fff; font-size:1.1rem; flex-shrink:0; }
    .player-row .pr-name { flex:1; font-weight:700; }
    .invite-btn { background: linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:.85rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
    .invite-btn:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(124,92,252,.4); }
    .invite-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .game-arena { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .arena-card { background:var(--card); border:2px solid var(--border); border-radius:var(--radius); padding:20px; }
    .arena-card.my-side { border-color: var(--accent); }
    .arena-card .ac-name { font-weight:800; font-size:1rem; margin-bottom:8px; }
    .arena-card .ac-score { font-size:2rem; font-weight:900; color:var(--accent); }
    .ac-words { list-style:none; margin-top:10px; max-height:180px; overflow-y:auto; }
    .ac-words li { font-size:.82rem; padding:3px 0; border-bottom:1px solid var(--border); color:var(--muted); }
    .ac-words li.valid { color:var(--green); }
    .ac-words li.invalid { color:var(--red); text-decoration:line-through; }
    .letter-display { text-align:center; background:var(--bg2); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
    .letter-display .big-letter { font-size:5rem; font-weight:900; color:var(--accent); line-height:1; }
    .letter-display .timer { font-size:2rem; font-weight:900; color:var(--gold); margin-top:8px; }
    .letter-display .timer.urgent { color:var(--red); animation: pulse .5s infinite; }
    .word-input-row { display:flex; gap:10px; margin-bottom:12px; }
    .word-input-row input { flex:1; padding:14px 18px; font-size:1.2rem; font-weight:700; text-transform:uppercase; background:var(--bg2); border:2px solid var(--accent); border-radius:10px; color:var(--text); outline:none; font-family:inherit; }
    .word-input-row input.shake { animation:shake .3s ease; }
    .word-input-row input.flash { border-color:var(--green); }
    .result-overlay { position:fixed; inset:0; background:rgba(13,13,26,.92); display:flex; align-items:center; justify-content:center; z-index:100; }
    .result-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:40px; text-align:center; max-width:420px; width:90%; animation:fadeIn .3s ease; }
    .result-box .big-icon { font-size:4rem; margin-bottom:12px; }
    .result-box h2 { font-size:1.8rem; margin-bottom:8px; }
    .result-box .res-scores { display:flex; gap:20px; justify-content:center; margin:16px 0; }
    .result-box .res-score-item { text-align:center; }
    .result-box .res-score-item .val { font-size:2.2rem; font-weight:900; }
    .result-box .res-score-item .lbl { font-size:.82rem; color:var(--muted); }
    .notification-banner { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:var(--card); border:2px solid var(--accent); border-radius:12px; padding:16px 24px; z-index:200; box-shadow:var(--shadow); animation:fadeIn .3s ease; text-align:center; min-width:300px; }
    .notification-banner h3 { margin-bottom:8px; }
    .notification-banner .notif-btns { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    @media(max-width:540px) { .game-arena { grid-template-columns:1fr; } .big-letter { font-size:3.5rem; } }
  </style>
</head>
<body>
<header class="site-header">
  <div class="logo">[ AkasztófaOnline ]</div>
  <nav class="nav-links">
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="index.html">Főoldal</a>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">⚙ Beállítások</button>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">Kilépés</button>
  </nav>
</header>

<div class="paros-wrap">

  <!-- LOBBY -->
  <div id="lobby-screen">
    <div class="lobby-card">
      <h2 style="font-size:1.4rem;font-weight:900;margin-bottom:6px;">⚔️ Páros játék</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-bottom:20px;">Hívd meg az egyik online játékost és versenyezzetek egymás ellen!</p>
      <h3 style="font-size:.9rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;">Online játékosok</h3>
      <div id="online-list"><div style="color:var(--muted);font-size:.9rem;">Betöltés...</div></div>
    </div>
    <div class="lobby-card" id="pending-card" style="display:none;border-color:var(--accent);">
      <div style="text-align:center;">
        <div style="font-size:2rem;margin-bottom:8px;">⏳</div>
        <div style="font-weight:700;" id="pending-text">Várom a válasz...</div>
        <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="cancelInvite()">Mégsem</button>
      </div>
    </div>
  </div>

  <!-- JÁTÉK -->
  <div id="game-screen" style="display:none;">
    <div class="letter-display">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:4px;">Betű amivel kezdődhet a szó:</div>
      <div class="big-letter" id="current-letter">?</div>
      <div class="timer" id="timer-display">--</div>
      <div style="font-size:.8rem;color:var(--muted);margin-top:6px;" id="round-info"></div>
    </div>

    <div class="game-arena">
      <div class="arena-card my-side">
        <div class="ac-name" id="my-name-display">Te</div>
        <div class="ac-score" id="my-score">0</div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px;">pont</div>
        <ul class="ac-words" id="my-words"></ul>
      </div>
      <div class="arena-card">
        <div class="ac-name" id="opp-name-display">Ellenfél</div>
        <div class="ac-score" id="opp-score">0</div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:6px;">pont</div>
        <ul class="ac-words" id="opp-words"></ul>
      </div>
    </div>

    <div class="word-input-row">
      <input type="text" id="word-input" placeholder="Írj egy szót..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" maxlength="30" />
      <button class="btn btn-primary" onclick="submitWord()">OK</button>
    </div>
    <div id="word-feedback" style="text-align:center;font-size:.9rem;font-weight:600;min-height:22px;"></div>
  </div>

  <!-- EREDMÉNY -->
  <div class="result-overlay" id="result-screen" style="display:none;">
    <div class="result-box">
      <div class="big-icon" id="res-icon"></div>
      <h2 id="res-title"></h2>
      <div class="res-scores" id="res-scores"></div>
      <p id="res-sub" style="color:var(--muted);margin-bottom:20px;"></p>
      <div style="display:flex;gap:12px;justify-content:center;">
        <button class="btn btn-primary" onclick="backToLobby()">Vissza a lobbyba</button>
        <a href="index.html" class="btn btn-outline">Főoldal</a>
      </div>
    </div>
  </div>

</div>

<!-- Meghívó értesítés -->
<div class="notification-banner" id="invite-notif" style="display:none;">
  <h3 id="invite-title">Meghívó érkezett!</h3>
  <p id="invite-text" style="color:var(--muted);font-size:.88rem;"></p>
  <div class="notif-btns">
    <button class="btn btn-primary btn-sm" onclick="acceptInvite()">Elfogad</button>
    <button class="btn btn-outline btn-sm" onclick="declineInvite()">Elutasít</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="settings.js"></script>
<script src="wordlist.js"></script>
<script src="hamburger.js"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY);
if (!username) { window.location.href = 'index.html'; }
document.getElementById('nav-user').textContent = username;
function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

function stringToColor(s) {
  const c=['#7c5cfc','#c45cfc','#fc5c5c','#5cfc8e','#f5c842','#5c9efc','#fc9e5c','#5cfcdc'];
  let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
}

// ── Állapot ──
const TIMEOUT = 45 * 1000;
let currentRoomId = null;
let roomUnsub = null;
let timerInterval = null;
let gameEndTime = null;
let myWords = [];
let opponentName = '';
let pendingInviteId = null;
let inviteUnsub = null;

// ── Online játékosok listázása ──
function loadOnlinePlayers() {
  db.collection('presence').onSnapshot(snap => {
    const list = document.getElementById('online-list');
    const active = [];
    const now = Date.now();
    snap.forEach(d => {
      const u = d.data();
      if (u.name !== username && (now - (u.since||0)) < TIMEOUT) active.push(u);
    });
    if (active.length === 0) {
      list.innerHTML = '<div style="color:var(--muted);font-size:.9rem;padding:12px 0;">Jelenleg nincs más online játékos.</div>';
      return;
    }
    list.innerHTML = active.map(u => {
      const col = stringToColor(u.name);
      return '<div class="player-row online">' +
        '<div class="pr-avatar" style="background:'+col+';">'+u.name.charAt(0).toUpperCase()+'</div>' +
        '<span class="pr-name">'+u.name+'</span>' +
        '<span style="color:var(--green);font-size:.78rem;font-weight:600;">● Online</span>' +
        '<button class="invite-btn" onclick="sendInvite(\''+u.name+'\')">Meghívás</button>' +
      '</div>';
    }).join('');
  });
}

// ── Meghívó küldése ──
async function sendInvite(toName) {
  document.getElementById('lobby-screen').querySelector('.lobby-card').style.display = 'none';
  const pending = document.getElementById('pending-card');
  pending.style.display = 'block';
  document.getElementById('pending-text').textContent = toName + ' meghívása folyamatban...';

  const inviteRef = await db.collection('invites').add({
    from: username,
    to: toName,
    status: 'pending',
    created: Date.now()
  });
  pendingInviteId = inviteRef.id;

  // Figyeljük a meghívó státuszát
  inviteUnsub = db.collection('invites').doc(inviteRef.id).onSnapshot(snap => {
    const data = snap.data();
    if (!data) return;
    if (data.status === 'accepted') {
      if (inviteUnsub) { inviteUnsub(); inviteUnsub = null; }
      joinRoom(data.roomId, toName);
    } else if (data.status === 'declined') {
      if (inviteUnsub) { inviteUnsub(); inviteUnsub = null; }
      document.getElementById('pending-text').textContent = toName + ' elutasította a meghívót.';
      setTimeout(() => {
        pending.style.display = 'none';
        document.getElementById('lobby-screen').querySelector('.lobby-card').style.display = 'block';
      }, 2000);
    }
  });
}

function cancelInvite() {
  if (pendingInviteId) {
    db.collection('invites').doc(pendingInviteId).update({ status: 'cancelled' });
    pendingInviteId = null;
  }
  if (inviteUnsub) { inviteUnsub(); inviteUnsub = null; }
  document.getElementById('pending-card').style.display = 'none';
  document.getElementById('lobby-screen').querySelector('.lobby-card').style.display = 'block';
}

// ── Bejövő meghívók figyelése ──
function watchInvites() {
  db.collection('invites')
    .where('to', '==', username)
    .where('status', '==', 'pending')
    .onSnapshot(snap => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const inv = change.doc.data();
          showInviteNotif(change.doc.id, inv.from);
        }
      });
    });
}

let currentInviteId = null;
function showInviteNotif(inviteId, fromName) {
  currentInviteId = inviteId;
  document.getElementById('invite-title').textContent = fromName + ' meghívott!';
  document.getElementById('invite-text').textContent = 'Páros szójátékra hív. Elfogadod?';
  document.getElementById('invite-notif').style.display = 'block';
}

async function acceptInvite() {
  document.getElementById('invite-notif').style.display = 'none';
  const invSnap = await db.collection('invites').doc(currentInviteId).get();
  const inv = invSnap.data();

  // Szoba létrehozása
  const times = [20, 30, 45, 60];
  const roundTime = times[Math.floor(Math.random() * times.length)];
  const letters = 'ABCDEFGHIJKLMNOPRSTUVZ';
  const letter = letters[Math.floor(Math.random() * letters.length)];

  const roomRef = await db.collection('rooms').add({
    players: [inv.from, username],
    letter: letter,
    roundTime: roundTime,
    startTime: Date.now() + 3000,
    endTime: Date.now() + 3000 + roundTime * 1000,
    status: 'playing',
    words: {},
    scores: { [inv.from]: 0, [username]: 0 }
  });

  await db.collection('invites').doc(currentInviteId).update({
    status: 'accepted',
    roomId: roomRef.id
  });

  opponentName = inv.from;
  joinRoom(roomRef.id, inv.from);
}

function declineInvite() {
  document.getElementById('invite-notif').style.display = 'none';
  if (currentInviteId) {
    db.collection('invites').doc(currentInviteId).update({ status: 'declined' });
  }
}
</script>

<script>
// ── Szoba csatlakozás ──
function joinRoom(roomId, oppName) {
  currentRoomId = roomId;
  opponentName = oppName;
  myWords = [];

  document.getElementById('lobby-screen').style.display = 'none';
  document.getElementById('pending-card').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  document.getElementById('my-name-display').textContent = 'Te';
  document.getElementById('opp-name-display').textContent = oppName;
  document.getElementById('my-words').innerHTML = '';
  document.getElementById('opp-words').innerHTML = '';

  // Szoba figyelése
  roomUnsub = db.collection('rooms').doc(roomId).onSnapshot(snap => {
    const room = snap.data();
    if (!room) return;

    // Betű megjelenítése
    document.getElementById('current-letter').textContent = room.letter;
    document.getElementById('round-info').textContent = 'Idő: ' + room.roundTime + ' mp';

    // Pontszámok frissítése
    document.getElementById('my-score').textContent = (room.scores && room.scores[username]) || 0;
    document.getElementById('opp-score').textContent = (room.scores && room.scores[oppName]) || 0;

    // Ellenfél szavai
    if (room.words && room.words[oppName]) {
      const oppWordsEl = document.getElementById('opp-words');
      oppWordsEl.innerHTML = room.words[oppName].map(w =>
        '<li class="valid">' + w + '</li>'
      ).join('');
    }

    // Timer indítás
    if (!timerInterval && room.endTime) {
      startTimer(room.endTime);
    }

    // Játék vége
    if (room.status === 'finished') {
      clearInterval(timerInterval);
      timerInterval = null;
      showResult(room);
    }
  });

  // Input fókusz
  setTimeout(() => document.getElementById('word-input').focus(), 500);
}

// ── Timer ──
function startTimer(endTime) {
  const timerEl = document.getElementById('timer-display');
  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    timerEl.textContent = remaining + 's';
    timerEl.className = 'timer' + (remaining <= 10 ? ' urgent' : '');

    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      endGame();
    }
  }, 200);
}

// ── Szó beküldése ──
async function submitWord() {
  const input = document.getElementById('word-input');
  const word = input.value.trim().toUpperCase();
  const feedback = document.getElementById('word-feedback');
  input.value = '';
  input.focus();

  if (!word || word.length < 2) return;

  // Szoba lekérése az aktuális betűhöz
  const roomSnap = await db.collection('rooms').doc(currentRoomId).get();
  const room = roomSnap.data();
  if (!room || room.status === 'finished') return;

  const letter = room.letter;

  // Ellenőrzések
  if (!word.startsWith(letter)) {
    feedback.textContent = '❌ A szónak ' + letter + ' betűvel kell kezdődnie!';
    feedback.style.color = 'var(--red)';
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);
    return;
  }

  if (myWords.includes(word)) {
    feedback.textContent = '⚠️ Ezt a szót már beírtad!';
    feedback.style.color = 'var(--gold)';
    return;
  }

  if (!isValidWord(word)) {
    feedback.textContent = '❌ Ismeretlen szó: ' + word;
    feedback.style.color = 'var(--red)';
    input.classList.add('shake');
    setTimeout(() => input.classList.remove('shake'), 400);

    const li = document.createElement('li');
    li.className = 'invalid';
    li.textContent = word;
    document.getElementById('my-words').prepend(li);
    return;
  }

  // Érvényes szó
  myWords.push(word);
  const li = document.createElement('li');
  li.className = 'valid';
  li.textContent = word;
  document.getElementById('my-words').prepend(li);

  feedback.textContent = '✅ ' + word + ' — +1 pont!';
  feedback.style.color = 'var(--green)';
  input.classList.add('flash');
  setTimeout(() => input.classList.remove('flash'), 300);

  // Firestore frissítés
  const currentWords = room.words && room.words[username] ? room.words[username] : [];
  currentWords.push(word);
  await db.collection('rooms').doc(currentRoomId).update({
    ['words.' + username]: currentWords,
    ['scores.' + username]: currentWords.length
  });
}

// ── Játék vége ──
async function endGame() {
  if (!currentRoomId) return;
  try {
    await db.collection('rooms').doc(currentRoomId).update({ status: 'finished' });
  } catch(e) {}
}

// ── Eredmény megjelenítése ──
async function showResult(room) {
  if (roomUnsub) { roomUnsub(); roomUnsub = null; }

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';

  const myScore = (room.scores && room.scores[username]) || 0;
  const oppScore = (room.scores && room.scores[opponentName]) || 0;
  const won = myScore > oppScore;
  const draw = myScore === oppScore;

  document.getElementById('res-icon').textContent = draw ? '🤝' : won ? '🏆' : '😔';
  document.getElementById('res-title').textContent = draw ? 'Döntetlen!' : won ? 'Nyertél!' : 'Vesztettél...';
  document.getElementById('res-scores').innerHTML =
    '<div class="res-score-item"><div class="val" style="color:var(--accent);">' + myScore + '</div><div class="lbl">Te</div></div>' +
    '<div style="font-size:1.5rem;color:var(--muted);align-self:center;">vs</div>' +
    '<div class="res-score-item"><div class="val" style="color:var(--accent2);">' + oppScore + '</div><div class="lbl">' + opponentName + '</div></div>';
  document.getElementById('res-sub').textContent = 'Érvényes szavak száma';

  // XP és csillag jóváírás
  if (won || draw) {
    const xpGain = won ? 5 : 2;
    const coinGain = won ? 10 : 3;
    try {
      const ref = db.collection('users').doc(username);
      const snap = await ref.get();
      if (snap.exists) {
        await ref.update({
          xp: (snap.data().xp||0) + xpGain,
          coins: firebase.firestore.FieldValue.increment(coinGain)
        });
      }
    } catch(e) {}
    document.getElementById('res-sub').textContent += won
      ? ' — +' + xpGain + ' XP, +' + coinGain + ' ⭐'
      : ' — +' + xpGain + ' XP, +' + coinGain + ' ⭐ (döntetlen)';
  }
}

function backToLobby() {
  currentRoomId = null;
  myWords = [];
  opponentName = '';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('lobby-screen').style.display = 'block';
  document.getElementById('lobby-screen').querySelector('.lobby-card').style.display = 'block';
}

// Enter = szó beküldése
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('game-screen').style.display !== 'none') {
    submitWord();
  }
});

// Input auto-uppercase
const wordInp = document.getElementById('word-input');
if (wordInp) wordInp.addEventListener('input', () => {
  wordInp.value = wordInp.value.toUpperCase();
});

// Indítás
loadOnlinePlayers();
watchInvites();
</script>
</body>
</html>
