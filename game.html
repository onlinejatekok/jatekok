<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Képrejtvény – Találd ki!</title>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

<header class="site-header">
  <div class="logo">🖼️ Képrejtvény</div>
  <nav class="nav-links">
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="profile.html" id="nav-profile" style="display:none;">Profilom</a>
    <a href="index.html">Főoldal</a>
    <a href="leaderboard.html">🏆 Ranglista</a>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">Kilépés</button>
  </nav>
</header>

<div class="game-container">

  <!-- Kategória választó -->
  <div id="cat-screen" class="fadeIn">
    <div style="margin-bottom:20px;">
      <h2 style="font-size:1.5rem;font-weight:800;">Válassz kategóriát!</h2>
      <p style="color:var(--muted);font-size:.9rem;margin-top:4px;">Minél kevesebb tippel oldod meg, annál több pontot kapsz.</p>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- Játék képernyő -->
  <div id="game-screen" style="display:none;" class="fadeIn">

    <div class="hud">
      <div class="lives" id="lives-display"></div>
      <div class="round-info">Kör: <span id="round-num">1</span> / <span id="round-total">?</span></div>
      <div class="score">⭐ <span id="score-display">0</span></div>
    </div>

    <!-- Kép -->
    <div class="image-box">
      <img id="puzzle-img" src="" alt="Találd ki!" class="blurred" />
      <div class="blur-label" id="blur-label">🔍 Mi látható a képen?</div>
    </div>

    <!-- Kategória -->
    <div class="center" style="margin-bottom:12px;">
      <span class="category-badge" id="cat-badge"></span>
    </div>

    <!-- Szóhossz kijelző -->
    <div style="text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:6px;" id="word-length-info"></div>
    <div class="word-display" id="word-display"></div>

    <!-- Tipp gombok -->
    <div class="hint-bar">
      <button class="hint-btn" id="hint1-btn" onclick="useHint(1)">
        💡 Betű <span class="cost">(-50 pont)</span>
      </button>
      <button class="hint-btn" id="hint2-btn" onclick="useHint(2)">
        📝 Leírás <span class="cost">(-75 pont)</span>
      </button>
      <button class="hint-btn" id="hint3-btn" onclick="useHint(3)">
        🔍 Fókusz <span class="cost">(-100 pont)</span>
      </button>
    </div>

    <!-- Tipp szöveg -->
    <div class="hint-text" id="hint-text"></div>

    <!-- Bevitel -->
    <div class="input-row">
      <input type="text" id="guess-input" placeholder="Írd be a választ..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn btn-primary" onclick="submitGuess()">Küldés</button>
    </div>

    <!-- Visszajelzés -->
    <div class="feedback" id="feedback"></div>

    <!-- Következő gomb -->
    <div class="center" style="margin-top:8px;">
      <button class="btn btn-primary" id="next-btn" style="display:none;" onclick="nextPuzzle()">Következő ➜</button>
    </div>
  </div>

  <!-- Eredmény -->
  <div id="result-screen" style="display:none;" class="card result-screen fadeIn">
    <div class="big-icon" id="result-icon"></div>
    <h1 id="result-title"></h1>
    <div class="result-score" id="result-score"></div>
    <p id="result-sub" style="color:var(--muted);"></p>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="backToCategories()">🔄 Újra</button>
      <a href="profile.html" id="result-profile-link" class="btn btn-outline">👤 Profil</a>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="data.js?v=6"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY);
if (!username) { window.location.href = 'index.html'; }

document.getElementById('nav-user').textContent = username || '';
document.getElementById('nav-profile').style.display = 'inline';
document.getElementById('nav-profile').href = 'profile.html?player=' + encodeURIComponent(username);
document.getElementById('result-profile-link').href = 'profile.html?player=' + encodeURIComponent(username);

function doLogout() { localStorage.removeItem(SESSION_KEY); window.location.href = 'index.html'; }

// ── Állapot ──
let currentCat = null;
let puzzles = [];
let currentIdx = 0;
let score = 0;
let lives = MAX_LIVES;
let hintsUsed = 0;
let roundPoints = 0;
let solved = false;

// ── Kategória képernyő ──
function buildCatScreen() {
  const grid = document.getElementById('cat-grid');
  const icons = { allatok:'🐾', etelek:'🍽️', varosok:'🏙️', filmek:'🎬', targyak:'🔧', termeszet:'🌿' };
  grid.innerHTML = Object.entries(CATEGORIES).map(([key, label]) => {
    const count = PUZZLES.filter(p => p.category === key).length;
    return `<button class="cat-btn" onclick="startCategory('${key}')">
      <div class="cat-icon">${icons[key]||'🎯'}</div>
      <div class="cat-name">${label}</div>
      <div class="cat-count">${count} rejtvény</div>
    </button>`;
  }).join('');
}

function startCategory(cat) {
  currentCat = cat;
  // Szűrés és keverés
  puzzles = PUZZLES.filter(p => p.category === cat).sort(() => Math.random() - 0.5);
  currentIdx = 0;
  score = 0;
  lives = MAX_LIVES;

  document.getElementById('cat-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('round-total').textContent = puzzles.length;

  loadPuzzle();
}

function backToCategories() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('cat-screen').style.display = 'block';
}

// ── Rejtvény betöltése ──
function loadPuzzle() {
  solved = false;
  hintsUsed = 0;
  roundPoints = POINTS_CORRECT_NOHINT;

  const p = puzzles[currentIdx];

  // Kép — homályos
  const img = document.getElementById('puzzle-img');
  img.src = p.image;
  img.className = 'blurred';
  document.getElementById('blur-label').style.display = 'block';

  // Kategória badge
  document.getElementById('cat-badge').textContent = CATEGORIES[p.category];

  // Szóhossz kijelző
  const letterCount = p.word.replace(/ /g, '').length;
  const wordCount = p.word.trim().split(' ').length;
  document.getElementById('word-length-info').textContent =
    wordCount > 1
      ? `${wordCount} szó, összesen ${letterCount} betű`
      : `${letterCount} betűs szó`;
  buildWordDisplay(p.word, []);

  // Tipp gomb reset
  document.getElementById('hint1-btn').disabled = false;
  document.getElementById('hint2-btn').disabled = false;
  document.getElementById('hint3-btn').disabled = false;

  // Tipp szöveg reset
  const ht = document.getElementById('hint-text');
  ht.className = 'hint-text';
  ht.textContent = '';

  // Bevitel reset
  const input = document.getElementById('guess-input');
  input.value = '';
  input.disabled = false;
  input.className = '';
  input.focus();

  // Visszajelzés reset
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  // Következő gomb elrejtése
  document.getElementById('next-btn').style.display = 'none';

  // HUD
  document.getElementById('round-num').textContent = currentIdx + 1;
  renderLives();
  renderScore();
}

function buildWordDisplay(word, revealedIndices) {
  const container = document.getElementById('word-display');
  container.innerHTML = word.split('').map((ch, i) => {
    if (ch === ' ') return '<div class="letter-box space"></div>';
    const revealed = revealedIndices.includes(i);
    return `<div class="letter-box ${revealed ? 'revealed' : ''}">${revealed ? ch : ''}</div>`;
  }).join('');
}

// ── Tippek ──
const revealedLetters = {};

function useHint(n) {
  if (solved) return;
  const p = puzzles[currentIdx];
  hintsUsed = Math.max(hintsUsed, n);

  const ht = document.getElementById('hint-text');

  if (n === 1) {
    // Betűtipp: hint1 megmutatása
    document.getElementById('hint1-btn').disabled = true;
    roundPoints = Math.max(0, roundPoints - 50);
    ht.textContent = '💡 Tipp: ' + p.hint1;
    ht.className = 'hint-text show';
  } else if (n === 2) {
    // Leírás
    document.getElementById('hint2-btn').disabled = true;
    roundPoints = Math.max(0, roundPoints - 75);
    ht.textContent = '📝 ' + p.hint2;
    ht.className = 'hint-text show';
  } else if (n === 3) {
    // Kép fókusz: blur teljes eltávolítása
    document.getElementById('hint3-btn').disabled = true;
    roundPoints = Math.max(0, roundPoints - 100);
    const img = document.getElementById('puzzle-img');
    img.style.filter = 'blur(8px) brightness(0.8)';
    ht.textContent = '🔍 A kép most élesebb — nézd meg jobban!';
    ht.className = 'hint-text show';
  }
}

// ── Tipp küldése ──
function submitGuess() {
  if (solved) return;
  const p = puzzles[currentIdx];
  const input = document.getElementById('guess-input');
  const guess = input.value.trim().toUpperCase();
  const correct = p.word.toUpperCase();

  if (!guess) return;

  const fb = document.getElementById('feedback');

  if (guess === correct) {
    // ✅ Helyes
    solved = true;
    score += roundPoints;
    renderScore();

    // Kép felfedése
    const img = document.getElementById('puzzle-img');
    img.style.filter = 'none';
    img.className = '';
    document.getElementById('blur-label').style.display = 'none';

    // Szóhossz teli megmutatása
    buildWordDisplay(p.word, [...Array(p.word.length).keys()]);

    fb.textContent = '✅ Helyes! +' + roundPoints + ' pont';
    fb.className = 'feedback show correct';

    input.disabled = true;
    input.className = 'correct-flash';

    document.getElementById('hint1-btn').disabled = true;
    document.getElementById('hint2-btn').disabled = true;
    document.getElementById('hint3-btn').disabled = true;

    setTimeout(() => {
      if (currentIdx >= puzzles.length - 1) {
        showResult(true);
      } else {
        document.getElementById('next-btn').style.display = 'inline-block';
      }
    }, 1000);

  } else {
    // ❌ Helytelen
    lives--;
    renderLives();
    input.className = 'wrong-shake';
    setTimeout(() => { input.className = ''; }, 500);
    input.value = '';

    if (lives <= 0) {
      // Felfedjük a választ
      solved = true;
      const img = document.getElementById('puzzle-img');
      img.style.filter = 'none'; img.className = '';
      document.getElementById('blur-label').style.display = 'none';
      buildWordDisplay(p.word, [...Array(p.word.length).keys()]);

      fb.textContent = '💀 Elfogytak az életeid! A helyes válasz: ' + p.word;
      fb.className = 'feedback show wrong';
      input.disabled = true;

      setTimeout(() => showResult(false), 1600);
    } else {
      fb.textContent = '❌ Nem ez! Még ' + lives + ' próbád van.';
      fb.className = 'feedback show wrong';
    }
  }
}

function nextPuzzle() {
  currentIdx++;
  if (currentIdx >= puzzles.length) { showResult(true); return; }
  const gs = document.getElementById('game-screen');
  gs.classList.remove('fadeIn'); void gs.offsetWidth; gs.classList.add('fadeIn');
  loadPuzzle();
}

// ── Eredmény ──
async function showResult(won) {
  try {
    const ref = db.collection('users').doc(username);
    const snap = await ref.get();
    if (snap.exists) {
      const u = snap.data();
      const updates = {
        gamesPlayed: (u.gamesPlayed||0) + 1,
        totalPoints: (u.totalPoints||0) + score,
        lastPlayed: Date.now(),
      };
      if (score > (u.bestScore||0)) updates.bestScore = score;
      await ref.update(updates);
    }
  } catch(e) { console.error(e); }

  document.getElementById('game-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  document.getElementById('result-icon').textContent = won ? '🎉' : '💀';
  document.getElementById('result-title').textContent = won ? 'Gratulálok!' : 'Vége!';
  document.getElementById('result-score').textContent = score + ' pont';
  document.getElementById('result-sub').textContent = won
    ? 'Teljesítetted az összes rejtvényt a kategóriában!'
    : 'Elfogytak az életeid. Próbáld újra!';
}

function renderLives() {
  const el = document.getElementById('lives-display');
  el.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) el.innerHTML += i < lives ? '❤️' : '🖤';
}
function renderScore() { document.getElementById('score-display').textContent = score; }

// Enter = küldés
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('game-screen').style.display !== 'none') {
    submitGuess();
  }
});

buildCatScreen();
</script>
</body>
</html>
