<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-6255373288681857">
  <title>AkasztófaOnline – Játék</title>
  <link rel="stylesheet" href="style.css?v=7" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6255373288681857" crossorigin="anonymous"></script>
</head>
<body>

<header class="site-header">
  <div class="logo">[ AkasztófaOnline ]</div>
  <nav class="nav-links">
    <span id="nav-user" style="color:var(--muted);font-size:.9rem;"></span>
    <a href="profile.html" id="nav-profile" style="display:none;">Profilom</a>
    <a href="index.html">Főoldal</a>
    <a href="wheel.html">🎡 Kerék</a>
    <a href="leaderboard.html">🏆 Ranglista</a>
    <button onclick="openSettings()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">⚙️ Beállítások</button>
    <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;">Kilépés</button>
  </nav>
</header>

<!-- NEHÉZSÉG VÁLASZTÓ -->
<div class="cat-screen fadeIn" id="diff-screen">
  <h2 style="font-size:1.6rem;font-weight:900;">Válassz nehézséget!</h2>
  <p style="color:var(--muted);margin-top:6px;font-size:.92rem;">A nehezebb szavak több XP-t érnek.</p>
  <div class="cat-grid" style="grid-template-columns:repeat(3,1fr);margin-top:24px;" id="diff-grid">
    <button class="cat-btn" onclick="selectDifficulty('easy')">
      <div class="ci">🟢</div>
      <div class="cn">Könnyű</div>
      <div class="cc">+1 XP / szó</div>
    </button>
    <button class="cat-btn" onclick="selectDifficulty('medium')">
      <div class="ci">🟡</div>
      <div class="cn">Közepes</div>
      <div class="cc">+2 XP / szó</div>
    </button>
    <button class="cat-btn" onclick="selectDifficulty('hard')">
      <div class="ci">🔴</div>
      <div class="cn">Nehéz</div>
      <div class="cc">+4 XP / szó</div>
    </button>
  </div>

  <!-- Akasztófa toplista -->
  <div style="max-width:560px;margin:32px auto 0;">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h3 style="font-size:1rem;font-weight:900;">🏆 Akasztófa toplista</h3>
        <a href="leaderboard.html" style="font-size:.78rem;color:var(--accent);">Teljes lista →</a>
      </div>
      <ul class="leaderboard" id="game-leaderboard" style="font-size:.88rem;">
        <li style="color:var(--muted);padding:8px 0;">Betöltés...</li>
      </ul>
    </div>
  </div>
</div>

<!-- KATEGÓRIA VÁLASZTÓ -->
<div class="cat-screen fadeIn" id="cat-screen" style="display:none;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
    <button onclick="goToDiffScreen()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:6px 14px;cursor:pointer;font-family:inherit;">← Vissza</button>
    <div>
      <h2 style="font-size:1.6rem;font-weight:900;">Válassz kategóriát!</h2>
      <p style="color:var(--muted);font-size:.88rem;">Nehézség: <strong id="diff-label-display"></strong></p>
    </div>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- JÁTÉK -->
<div class="game-wrap" id="game-screen" style="display:none;">

  <!-- HUD -->
  <div class="hud">
    <div class="lives-bar" id="lives-bar"></div>
    <div class="cat-label">Kategória: <strong id="cat-label-text"></strong></div>
    <div id="rank-display" style="font-size:.85rem;"></div>
  </div>

  <div class="game-area">
    <!-- Akasztófa rajz -->
    <div class="hangman-box">
      <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">
        <line class="hm-base" x1="10" y1="190" x2="150" y2="190"/>
        <line class="hm-pole" x1="40" y1="190" x2="40" y2="10"/>
        <line class="hm-top"  x1="40" y1="10"  x2="110" y2="10"/>
        <line class="hm-rope" x1="110" y1="10"  x2="110" y2="35"/>
        <circle id="hm-head"  cx="110" cy="50" r="16" stroke="#fc5c5c" stroke-width="3" fill="none" class="hm-part"/>
        <line   id="hm-body"  x1="110" y1="66" x2="110" y2="120" stroke="#fc5c5c" stroke-width="3" stroke-linecap="round" class="hm-part"/>
        <line   id="hm-arm-l" x1="110" y1="80" x2="80"  y2="105" stroke="#fc5c5c" stroke-width="3" stroke-linecap="round" class="hm-part"/>
        <line   id="hm-arm-r" x1="110" y1="80" x2="140" y2="105" stroke="#fc5c5c" stroke-width="3" stroke-linecap="round" class="hm-part"/>
        <line   id="hm-leg-l" x1="110" y1="120" x2="85"  y2="155" stroke="#fc5c5c" stroke-width="3" stroke-linecap="round" class="hm-part"/>
        <line   id="hm-leg-r" x1="110" y1="120" x2="135" y2="155" stroke="#fc5c5c" stroke-width="3" stroke-linecap="round" class="hm-part"/>
      </svg>
    </div>

    <!-- Jobb panel -->
    <div class="right-panel">
      <div class="hint-box">
        💡 Tipp: <strong id="hint-text">—</strong>
      </div>
      <div class="word-display" id="word-display"></div>
      <div class="feedback-msg" id="feedback-msg"></div>
    </div>
  </div>

  <!-- ABC vagy mobil bevitel -->
  <div id="abc-grid" class="abc-grid"></div>

  <!-- Mobil beviteli mező (mobilos módban) -->
  <div id="mobile-input-wrap" style="display:none;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);">
    <div style="color:var(--muted);font-size:.85rem;margin-bottom:8px;text-align:center;">Írd be a következő betűt:</div>
    <div style="display:flex;gap:10px;">
      <input type="text"
        id="mobile-letter-input"
        maxlength="1"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        inputmode="text"
        placeholder="Betű..."
        style="flex:1;padding:14px 16px;font-size:1.4rem;font-weight:700;text-align:center;text-transform:uppercase;background:var(--card);border:2px solid var(--accent);border-radius:10px;color:var(--text);outline:none;font-family:inherit;"
      />
      <button onclick="submitMobileLetter()" class="btn btn-primary" style="font-size:1.1rem;padding:14px 20px;">OK</button>
    </div>
    <div style="color:var(--muted);font-size:.78rem;text-align:center;margin-top:8px;">Már tippelt betűk: <span id="used-letters-display" style="color:var(--text);font-weight:600;"></span></div>
  </div>

  <!-- Csillag vásárlás -->
  <div style="text-align:center;margin-top:14px;">
    <button class="hint-buy-btn" id="buy-hint-btn" onclick="buyHint()">
      ⭐ Betű felfedése — 3 csillagért
    </button>
    <div id="coins-display" style="color:var(--muted);font-size:.82rem;margin-top:6px;"></div>
  </div>

</div>

<!-- EREDMÉNY OVERLAY -->
<div class="result-overlay" id="result-overlay" style="display:none;">
  <div class="result-box fadeIn">
    <div class="big-icon" id="res-icon"></div>
    <h2 id="res-title"></h2>
    <div class="res-word" id="res-word"></div>
    <div class="res-score" id="res-xp" style="font-size:1.5rem;color:var(--accent);font-weight:800;margin:10px 0;"></div>
    <div id="res-rank-up" style="color:var(--gold);font-size:1rem;font-weight:700;min-height:24px;"></div>
    <div class="res-actions">
      <button class="btn btn-primary" onclick="nextWord()">▶ Következő szó</button>
      <button class="btn btn-outline" onclick="goToCatScreen()">🔄 Kategória</button>
      <a href="profile.html" id="res-profile-link" class="btn btn-outline">👤 Profil</a>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js?v=7"></script>
<script src="data.js?v=7"></script>
<script src="ranks.js"></script>
<script src="settings.js"></script>
<script src="hamburger.js"></script>
<script>
const SESSION_KEY = 'doorpuzzle_session';
const username = localStorage.getItem(SESSION_KEY);
if (!username) { window.location.href = 'index.html'; }

document.getElementById('nav-user').textContent = username || '';
document.getElementById('nav-profile').style.display = 'inline';
document.getElementById('nav-profile').href = 'profile.html?player=' + encodeURIComponent(username);
document.getElementById('res-profile-link').href = 'profile.html?player=' + encodeURIComponent(username);

function doLogout() {
  setOffline();
  localStorage.removeItem(SESSION_KEY);
  window.location.href = 'index.html';
}

// ── Online jelenlét kezelése ──
function setOnline() {
  if (!username) return;
  db.collection('presence').doc(username).set({
    name: username,
    online: true,
    where: 'akasztófa',
    since: Date.now()
  }).catch(()=>{});
}

function setOffline() {
  if (!username) return;
  db.collection('presence').doc(username).delete().catch(()=>{});
}

// Heartbeat — 20mp-enként frissíti az időbélyeget
let heartbeatInterval = setInterval(() => {
  if (username) {
    db.collection('presence').doc(username).set({
      name: username,
      online: true,
      since: Date.now()
    }).catch(()=>{});
  }
}, 20000);

window.addEventListener('beforeunload', () => { setOffline(); clearInterval(heartbeatInterval); });
window.addEventListener('pagehide', () => { setOffline(); clearInterval(heartbeatInterval); });
setOnline();

const HU_ABC = ['A','Á','B','C','D','E','É','F','G','H','I','Í','J','K','L','M','N','O','Ó','Ö','Ő','P','R','S','T','U','Ú','Ü','Ű','V','Y','Z'];
const HM_PARTS = ['hm-head','hm-body','hm-arm-l','hm-arm-r','hm-leg-l','hm-leg-r'];

let currentCat = null;
let currentDifficulty = 'easy';
let catWords = [];
let wordIndex = 0;
let currentWord = '';
let currentHint = '';
let guessedLetters = [];
let wrongCount = 0;
let sessionXP = 0;
let userCoins = 0;
let solvedStreak = 0;
let solvedWords = new Set();
const HINT_COST = 3;
const STREAK_BONUS_AT = 5;
const STREAK_BONUS_COINS = 5;

// ── Kitalált szavak mentése localStorage-ba ──
// Globális lista — kategória és nehézségtől függetlenül
function globalSolvedKey() {
  return 'hangman_solved_global_' + username;
}

function loadSolvedWords() {
  try {
    const raw = localStorage.getItem(globalSolvedKey());
    return new Set(raw ? JSON.parse(raw) : []);
  } catch(e) { return new Set(); }
}

function saveSolvedWord(word) {
  try {
    const existing = loadSolvedWords();
    existing.add(word.toUpperCase());
    localStorage.setItem(globalSolvedKey(), JSON.stringify([...existing]));
  } catch(e) {}
}

const CAT_ICONS = { allatok:'🐾', etelek:'🍽️', varosok:'🏙️', sport:'⚽', termeszet:'🌿', targyak:'🔧' };

function selectDifficulty(diff) {
  currentDifficulty = diff;
  document.getElementById('diff-screen').style.display = 'none';
  document.getElementById('cat-screen').style.display = 'block';
  document.getElementById('diff-label-display').textContent = DIFFICULTY[diff].label;
  buildCatScreen();
}

function goToDiffScreen() {
  document.getElementById('cat-screen').style.display = 'none';
  document.getElementById('diff-screen').style.display = 'block';
}

// ── Kategória képernyő ──
function buildCatScreen() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = Object.entries(CATEGORIES).map(([key, label]) => {
    const count = getWords(currentDifficulty, key).length;
    return '<button class="cat-btn" onclick="startCategory(\'' + key + '\')">' +
      '<div class="ci">' + (CAT_ICONS[key]||'🎯') + '</div>' +
      '<div class="cn">' + label + '</div>' +
      '<div class="cc">' + count + ' szó</div>' +
      '</button>';
  }).join('');
}

function startCategory(cat) {
  currentCat = cat;
  catWords = [...getWords(currentDifficulty, cat)].sort(() => Math.random() - 0.5);
  wordIndex = 0;
  sessionXP = 0;
  solvedWords = loadSolvedWords(); // betöltjük a már kitalált szavakat
  document.getElementById('cat-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('cat-label-text').textContent = CATEGORIES[cat] + ' · ' + DIFFICULTY[currentDifficulty].label;
  loadWord();
}

function goToCatScreen() {
  document.getElementById('result-overlay').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('diff-screen').style.display = 'block';
}

// ── Szó betöltése ──
function loadWord() {
  // Kihagyja a már kitalált szavakat
  const available = catWords.filter(e => !solvedWords.has(e.word));

  if (available.length === 0) {
    const fb = document.getElementById('feedback-msg');
    fb.textContent = '🎉 Minden szót kitaláltál! A lista újraindul...';
    fb.className = 'feedback-msg show correct';
    localStorage.removeItem(globalSolvedKey());
    solvedWords = new Set();
    catWords = [...getWords(currentDifficulty, currentCat)].sort(() => Math.random() - 0.5);
    setTimeout(() => { fb.className = 'feedback-msg'; loadWord(); }, 2500);
    return;
  }

  // Véletlenszerű szó a még nem kitaláltak közül
  const entry = available[Math.floor(Math.random() * available.length)];
  currentWord = entry.word.toUpperCase();
  currentHint = entry.hint;
  guessedLetters = [];
  wrongCount = 0;

  document.getElementById('hint-text').textContent = currentHint;
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('feedback-msg').textContent = '';

  renderWord();
  renderLives();
  renderHangman();
  buildABC();
  applyInputMode();
}

// ── Szó kijelző ──
function renderWord() {
  const container = document.getElementById('word-display');
  container.innerHTML = currentWord.split('').map(ch => {
    if (ch === ' ') return '<div class="letter-slot space"></div>';
    const shown = guessedLetters.includes(ch);
    return '<div class="letter-slot' + (shown ? ' revealed' : '') + '">' + (shown ? ch : '') + '</div>';
  }).join('');
}

// ── Élet sáv ──
function renderLives() {
  const bar = document.getElementById('lives-bar');
  let html = '';
  for (let i = 0; i < MAX_WRONG; i++) {
    html += '<span>' + (i < (MAX_WRONG - wrongCount) ? '❤️' : '🖤') + '</span>';
  }
  bar.innerHTML = html;
}

// ── Akasztófa ──
function renderHangman() {
  HM_PARTS.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('visible', i < wrongCount);
  });
}

// ── ABC gombok ──
function buildABC() {
  const grid = document.getElementById('abc-grid');
  grid.innerHTML = HU_ABC.map(letter => {
    const used = guessedLetters.includes(letter);
    const isCorrect = used && currentWord.includes(letter);
    const isWrong = used && !currentWord.includes(letter);
    return '<button class="letter-btn' + (isCorrect?' correct':isWrong?' wrong':'') + '"' +
      ' onclick="guessLetter(\'' + letter + '\')"' +
      (used ? ' disabled' : '') + '>' + letter + '</button>';
  }).join('');
}

// ── Betű tippelése ──
function guessLetter(letter) {
  if (guessedLetters.includes(letter)) return;
  guessedLetters.push(letter);

  const fb = document.getElementById('feedback-msg');

  if (currentWord.includes(letter)) {
    renderWord();
    fb.textContent = '✅ Helyes betű!';
    fb.className = 'feedback-msg show correct';
    playSound('correct');

    const allFound = currentWord.split('').every(ch => ch === ' ' || guessedLetters.includes(ch));
    if (allFound) {
      solvedWords.add(currentWord);
      saveSolvedWord(currentWord); // elmentjük localStorage-ba
      const baseXP = DIFFICULTY[currentDifficulty].xp;
      sessionXP = wrongCount === 0 ? baseXP * 2 : baseXP;
      setTimeout(() => showResult(true), 600);
    }
  } else {
    wrongCount++;
    renderLives();
    renderHangman();

    fb.textContent = '❌ Nincs ilyen betű! (' + (MAX_WRONG - wrongCount) + ' tipp maradt)';
    fb.className = 'feedback-msg show wrong';
    fb.classList.add('shake');
    setTimeout(() => fb.classList.remove('shake'), 400);
    playSound('wrong');

    if (wrongCount >= MAX_WRONG) {
      setTimeout(() => showResult(false), 600);
    }
  }

  // ABC gomb frissítése
  const btn = [...document.querySelectorAll('.letter-btn')].find(b => b.textContent === letter);
  if (btn) {
    btn.disabled = true;
    btn.classList.add(currentWord.includes(letter) ? 'correct' : 'wrong');
  }
}

// ── Eredmény ──
async function showResult(won) {
  if (!won) {
    guessedLetters = currentWord.split('').filter(c => c !== ' ');
    renderWord();
  }

  const xpEarned = won ? sessionXP : 0;
  let bonusCoins = 0;

  if (won) {
    solvedStreak++;
    if (solvedStreak % STREAK_BONUS_AT === 0) bonusCoins = STREAK_BONUS_COINS;
  } else {
    solvedStreak = 0;
  }

  try {
    const ref = db.collection('users').doc(username);
    const snap = await ref.get();
    if (snap.exists) {
      const u = snap.data();
      const oldXP = u.xp || 0;
      const newXP = oldXP + xpEarned;
      const oldRank = getRank(oldXP).name;
      const newRank = getRank(newXP).name;

      const updates = {
        gamesPlayed: (u.gamesPlayed||0) + 1,
        lastPlayed: Date.now(),
        xp: newXP,
        coins: firebase.firestore.FieldValue.increment(won ? 5 : 0),
      };
      if (bonusCoins > 0) {
        updates.coins = firebase.firestore.FieldValue.increment(bonusCoins);
        userCoins += bonusCoins;
        updateCoinsDisplay();
        playSound('bonus');
      }
      await ref.update(updates);
      renderRank(newXP);

      let extraMsg = '';
      if (won && oldRank !== newRank) {
        extraMsg = '🎉 Új rang: ' + getRank(newXP).icon + ' ' + newRank + '!';
        playSound('rank');
      }
      if (bonusCoins > 0) extraMsg = '🎁 +' + bonusCoins + ' ⭐ sorozat bónusz! ' + extraMsg;
      if (!extraMsg && won) {
        const left = STREAK_BONUS_AT - (solvedStreak % STREAK_BONUS_AT);
        extraMsg = '🔥 Sorozat: ' + solvedStreak + ' | Még ' + left + ' szó a bónuszig!';
      }
      document.getElementById('res-rank-up').textContent = extraMsg;
    }
  } catch(e) { console.error(e); }

  document.getElementById('result-overlay').style.display = 'flex';
  document.getElementById('res-icon').textContent = won ? '🎉' : '💀';
  document.getElementById('res-title').textContent = won ? 'Megtaláltad!' : 'Sajnos akasztva lettél...';
  document.getElementById('res-word').textContent = 'A szó: ' + currentWord;
  document.getElementById('res-xp').textContent = won
    ? '+' + xpEarned + ' XP' + (wrongCount === 0 ? ' (hibátlan! 🌟)' : '')
    : 'Nem szereztél XP-t';

  if (won) playSound('win'); else playSound('lose');
  sessionXP = 0;
}

function nextWord() {
  document.getElementById('result-overlay').style.display = 'none';
  wordIndex++;
  loadWord();
}

function renderRank(xp) {
  const rank = getRank(xp || 0);
  const prog = getXpProgress(xp || 0);
  const el = document.getElementById('rank-display');
  el.innerHTML =
    '<span style="color:' + rank.color + ';font-weight:700;">' + rank.icon + ' ' + rank.name + '</span>' +
    '<span style="color:var(--muted);font-size:.75rem;margin-left:6px;">(' + (xp||0) + ' XP' +
    (prog.next ? ' / ' + prog.next.min + ')' : ' — MAX)') + '</span>';
}

async function loadUserXP() {
  try {
    const snap = await db.collection('users').doc(username).get();
    if (snap.exists) {
      renderRank(snap.data().xp || 0);
      userCoins = snap.data().coins || 0;
      updateCoinsDisplay();
    }
  } catch(e) {}
}

// Valós idejű csillag figyelés — ha kerékből kap csillagot, azonnal frissül
function watchCoins() {
  db.collection('users').doc(username).onSnapshot(snap => {
    if (snap.exists) {
      const newCoins = snap.data().coins || 0;
      if (newCoins !== userCoins) {
        userCoins = newCoins;
        updateCoinsDisplay();
      }
      renderRank(snap.data().xp || 0);
    }
  });
}

function updateCoinsDisplay() {
  const btn = document.getElementById('buy-hint-btn');
  const disp = document.getElementById('coins-display');
  if (btn) btn.disabled = userCoins < HINT_COST;
  if (disp) disp.textContent = 'Egyenleged: ' + userCoins + ' ⭐';
}

async function buyHint() {
  if (userCoins < HINT_COST) return;

  // Megkeresi a még nem kitalált betűket
  const hidden = [...new Set(
    currentWord.split('').filter(c => c !== ' ' && !guessedLetters.includes(c))
  )];
  if (hidden.length === 0) return;

  // Véletlenszerű betű felfedése
  const letter = hidden[Math.floor(Math.random() * hidden.length)];

  // Csillag levonás Firebase-ben
  try {
    userCoins -= HINT_COST;
    await db.collection('users').doc(username).update({
      coins: firebase.firestore.FieldValue.increment(-HINT_COST)
    });
    updateCoinsDisplay();
  } catch(e) { console.error(e); return; }

  // Betű tippelése (ingyen, jelöli a gombokat is)
  guessedLetters.push(letter);
  renderWord();

  const fb = document.getElementById('feedback-msg');
  fb.textContent = '💡 Felfedett betű: ' + letter + ' (−' + HINT_COST + ' ⭐)';
  fb.className = 'feedback-msg show correct';

  // ABC gomb frissítése
  const btn = [...document.querySelectorAll('.letter-btn')].find(b => b.textContent === letter);
  if (btn) { btn.disabled = true; btn.classList.add('correct'); }

  // Megvan az összes betű?
  const allFound = currentWord.split('').every(ch => ch === ' ' || guessedLetters.includes(ch));
  if (allFound) setTimeout(() => showResult(true), 600);
}

document.addEventListener('keydown', e => {
  if (document.getElementById('game-screen').style.display === 'none') return;
  if (document.getElementById('result-overlay').style.display !== 'none') return;
  const key = e.key.toUpperCase();
  if (HU_ABC.includes(key) && !guessedLetters.includes(key)) guessLetter(key);
});

// ── Mobilos beviteli mód ──
function applyInputMode() {
  const isMobile = getSettings().mobileMode;
  const abcGrid = document.getElementById('abc-grid');
  const mobileWrap = document.getElementById('mobile-input-wrap');
  if (!abcGrid || !mobileWrap) return;
  if (isMobile) {
    abcGrid.style.display = 'none';
    mobileWrap.style.display = 'block';
    updateUsedLetters();
    // Auto fókusz a beviteli mezőre
    setTimeout(() => {
      const inp = document.getElementById('mobile-letter-input');
      if (inp) inp.focus();
    }, 100);
  } else {
    abcGrid.style.display = 'flex';
    mobileWrap.style.display = 'none';
  }
}

function updateUsedLetters() {
  const el = document.getElementById('used-letters-display');
  if (!el) return;
  if (guessedLetters.length === 0) {
    el.textContent = '—';
  } else {
    el.textContent = guessedLetters.join(', ');
  }
}

function submitMobileLetter() {
  const inp = document.getElementById('mobile-letter-input');
  if (!inp) return;
  const letter = inp.value.trim().toUpperCase();
  inp.value = '';
  inp.focus();
  if (!letter || !HU_ABC.includes(letter)) return;
  if (guessedLetters.includes(letter)) return;
  guessLetter(letter);
  updateUsedLetters();
}

// Enter a mobil beviteli mezőnél + automatikus küldés beírás után
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('mobile-letter-input');
  if (inp) {
    // Enter gomb
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); submitMobileLetter(); }
    });
    // Automatikus küldés: ha beírt 1 betűt, azonnal elküldi
    inp.addEventListener('input', e => {
      const val = inp.value.trim();
      if (val.length === 1) {
        setTimeout(() => submitMobileLetter(), 100);
      }
    });
  }
});

// ── Akasztófa toplista betöltése ──
async function loadGameLeaderboard() {
  const el = document.getElementById('game-leaderboard');
  if (!el) return;
  try {
    const snap = await db.collection('users').get();
    const users = [];
    snap.forEach(d => {
      const u = d.data();
      if ((u.xp || 0) > 0 || (u.gamesPlayed || 0) > 0) {
        users.push({ name: u.name, xp: Number(u.xp) || 0, coins: u.coins || 0 });
      }
    });
    if (users.length === 0) {
      el.innerHTML = '<li style="color:var(--muted);padding:8px 0;">Még nincs játékos.</li>';
      return;
    }
    users.sort((a, b) => b.xp - a.xp || b.coins - a.coins);
    const rankCls = ['gold', 'silver', 'bronze'];
    el.innerHTML = users.slice(0, 8).map((u, i) => {
      const rank = getRank(u.xp);
      const isMe = u.name === username;
      const avatarColor = stringToColor(u.name);
      const place = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
      return '<li class="' + (isMe ? 'is-me' : '') + '">' +
        '<span class="lb-rank ' + (rankCls[i] || '') + '">' + place + '</span>' +
        '<div class="lb-avatar" style="background:' + avatarColor + ';">' + u.name.charAt(0).toUpperCase() + '</div>' +
        '<span class="lb-name">' +
          '<a href="profile.html?player=' + encodeURIComponent(u.name) + '">' + u.name + '</a>' +
          '<span style="background:' + rank.color + '22;color:' + rank.color + ';font-size:.65rem;font-weight:800;padding:1px 8px;border-radius:999px;margin-left:4px;">' + rank.icon + ' ' + rank.name + '</span>' +
          (isMe ? '<span style="background:var(--accent);color:#fff;font-size:.65rem;font-weight:800;padding:1px 7px;border-radius:999px;margin-left:4px;">Te</span>' : '') +
        '</span>' +
        '<span style="color:var(--gold);font-weight:700;font-size:.85rem;margin-left:auto;">' + u.xp + ' XP</span>' +
      '</li>';
    }).join('');
  } catch(e) {
    el.innerHTML = '<li style="color:var(--red);padding:8px 0;">Hiba</li>';
  }
}

function stringToColor(str) {
  const colors = ['#7c5cfc','#c45cfc','#fc5c5c','#5cfc8e','#f5c842','#5c9efc','#fc9e5c','#5cfcdc'];
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

loadUserXP();
watchCoins();
applyInputMode();
loadGameLeaderboard();
</script>
